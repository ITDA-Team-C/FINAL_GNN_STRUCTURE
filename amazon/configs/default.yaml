# Amazon dataset (CARE-GNN / PC-GNN .mat format)
# Place Amazon.mat in amazon/data/ before running.

dataset: amazon
mat_path: "amazon/data/Amazon.mat"
random_state: 42

split:
  train: 0.64
  valid: 0.16
  test: 0.20

training:
  epochs: 200
  learning_rate: 0.001
  early_stopping_patience: 20
  validation_interval: 5
  device: "cuda"

model:
  hidden_dim: 128
  num_layers: 3
  dropout: 0.3
  K: 3                # ChebConv polynomial order

loss:
  focal_alpha: 0.75
  focal_gamma: 2.0
  aux_weight: 0.3

care_filter:
  top_k: 10
